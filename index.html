<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenStation - Focus Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0f19;
            --card-bg: #151b2c;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-sub: #9ca3af;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-tomato: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Top Header Area */
        header {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greeting h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--text-sub));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .greeting p {
            color: var(--text-sub);
            margin-top: 5px;
            font-size: 0.95rem;
        }

        .live-clock {
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--accent-purple);
            font-variant-numeric: tabular-nums;
        }

        /* Dashboard Grid Layout */
        .dashboard-grid {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        /* --- Component 1: Pomodoro Timer --- */
        .pomodoro-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .timer-display {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin: 10px 0 25px 0;
            font-variant-numeric: tabular-nums;
        }

        .timer-controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent-purple);
            border-color: transparent;
        }
        .btn-primary:hover {
            background: #7c3aed;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        /* --- Component 2: To-Do List --- */
        .todo-input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .todo-input-wrapper input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .todo-input-wrapper input:focus {
            border-color: var(--accent-purple);
        }

        .btn-add {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            width: 50px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add:hover { background: var(--accent-purple); }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .todo-list::-webkit-scrollbar { width: 4px; }
        .todo-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .todo-item {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-text {
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-sub);
        }

        .todo-item.completed {
            border-color: rgba(16, 185, 129, 0.2);
            background: rgba(16, 185, 129, 0.02);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: rgba(239, 68, 68, 0.6);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .delete-btn:hover { color: var(--accent-tomato); }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="greeting">
            <h1 id="greeting-text">Hello, Explorer</h1>
            <p>"Simplicity is the ultimate sophistication."</p>
        </div>
        <div class="live-clock" id="live-clock">00:00:00</div>
    </header>

    <div class="dashboard-grid">
        <div class="card pomodoro-box">
            <div class="card-title" style="align-self: flex-start;">
                <i class="fa-solid fa-hourglass-half" style="color: var(--accent-purple);"></i>
                <span>Focus Session</span>
            </div>
            <div class="timer-display" id="timer-display">25:00</div>
            <div class="timer-controls">
                <button class="btn btn-primary" id="btn-start">
                    <i class="fa-solid fa-play"></i> <span id="start-text">Start</span>
                </button>
                <button class="btn" id="btn-reset">
                    <i class="fa-solid fa-rotate-right"></i> Reset
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-list-check" style="color: var(--accent-green);"></i>
                <span>Task Backlog</span>
            </div>
            <div class="todo-input-wrapper">
                <input type="text" id="todo-input" placeholder="What's your next milestone?">
                <button class="btn-add" id="btn-add-todo"><i class="fa-solid fa-plus"></i></button>
            </div>
            <ul class="todo-list" id="todo-list">
                </ul>
        </div>
    </div>

    <script>
        // 1. Clock & Dynamic Greetings
        function updateHeader() {
            const now = new Date();
            const hours = now.getHours();
            
            // Set Clock
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });

            // Set Smart Greeting
            let greet = "Good Evening";
            if (hours < 12) greet = "Good Morning";
            else if (hours < 18) greet = "Good Afternoon";
            
            document.getElementById('greeting-text').innerText = `${greet}, Focus Mode On`;
        }
        setInterval(updateHeader, 1000);
        updateHeader();

        // 2. Pomodoro Logic
        let timer;
        let timeLeft = 25 * 60;
        let isRunning = false;

        const timerDisplay = document.getElementById('timer-display');
        const startBtn = document.getElementById('btn-start');
        const startText = document.getElementById('start-text');
        const resetBtn = document.getElementById('btn-reset');

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const seconds = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${minutes}:${seconds}`;
        }

        startBtn.addEventListener('click', () => {
            if (isRunning) {
                // Pause
                clearInterval(timer);
                startText.innerText = "Start";
                startBtn.querySelector('i').className = "fa-solid fa-play";
                isRunning = false;
            } else {
                // Start
                isRunning = true;
                startText.innerText = "Pause";
                startBtn.querySelector('i').className = "fa-solid fa-pause";
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timer);
                        alert("Session complete! Take a short break.");
                        timeLeft = 25 * 60;
                        updateTimerDisplay();
                        isRunning = false;
                        startText.innerText = "Start";
                        startBtn.querySelector('i').className = "fa-solid fa-play";
                    }
                }, 1000);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timer);
            timeLeft = 25 * 60;
            updateTimerDisplay();
            isRunning = false;
            startText.innerText = "Start";
            startBtn.querySelector('i').className = "fa-solid fa-play";
        });


        // 3. LocalStorage Powered To-Do List
        let todos = JSON.parse(localStorage.getItem('zen_todos')) || [
            { id: 1, text: "Review project structural components", completed: false },
            { id: 2, text: "Deep work: 2 Focus Blocks", completed: true }
        ];

        const todoInput = document.getElementById('todo-input');
        const addTodoBtn = document.getElementById('btn-add-todo');
        const todoListContainer = document.getElementById('todo-list');

        function saveAndRender() {
            localStorage.setItem('zen_todos', JSON.stringify(todos));
            todoListContainer.innerHTML = '';
            
            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="todo-text" onclick="toggleTodo(${todo.id})">
                        <i class="fa-regular ${todo.completed ? 'fa-circle-check' : 'fa-circle'}" style="color: ${todo.completed ? 'var(--accent-green)' : 'var(--text-sub)'}"></i>
                        <span>${todo.text}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})"><i class="fa-solid fa-trash-can"></i></button>
                `;
                todoListContainer.appendChild(li);
            });
        }

        window.toggleTodo = function(id) {
            todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            saveAndRender();
        }

        window.deleteTodo = function(id) {
            todos = todos.filter(t => t.id !== id);
            saveAndRender();
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (text) {
                todos.push({ id: Date.now(), text, completed: false });
                todoInput.value = '';
                saveAndRender();
            }
        }

        addTodoBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTodo(); });

        // Initial Seed Render
        saveAndRender();
    </script>
</body>
</html>
